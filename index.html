<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monastery360 - Digitize Sikkim Monasteries</title>
    <meta name="description" content="Explore Sikkim's monasteries with 360° tours, maps, audio guides, and travel planning for tourism and cultural preservation." />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Pannellum CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css" />
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

    <!-- Custom CSS -->
    <style>
      #chatbot {
        transition: transform 0.3s ease-in-out;
        z-index: 200; /* Consistent with CSS z-index */
      }
      #chatbot.hidden {
        transform: translateX(100%);
      }
      #chatbot.visible {
        transform: translateX(0);
      }
    </style>
  </head>
  <body> <!-- Removed bg-gray-100 to avoid conflict, no fixed background -->
    <!-- React entrypoint -->
    <div id="root"></div>

    <!-- Floating Chatbot Toggle -->
    <div id="chatbot-toggle"
      class="fixed bottom-28 right-6 w-20 h-20 rounded-full bg-white flex items-center justify-center shadow-lg cursor-pointer hover:bg-gray-200 transition overflow-hidden">
      <img src="./src/pages/ch.jpg"
        alt="Tourism Logo" class="w-full h-full object-contain rounded-full">
    </div>

    <!-- Chatbot Sidebar -->
    <div id="chatbot" class="fixed top-16 right-0 w-96 h-[calc(100%-4rem)] bg-white shadow-lg hidden flex flex-col border-l z-50">
      <!-- Header -->
      <div class="chat-header bg-green-700 text-white p-4 flex justify-between items-center">
        <span class="font-bold">🏞 Sikkim Tourism Helper</span>
        <button id="close-chat" class="text-xl">&times;</button>
      </div>

      <!-- Chatbox -->
      <div id="chatbox" class="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-50">
        <div class="message bot">👋 Hi! I’m your Sikkim Tourism Helper. It's 03:03 AM IST on Sunday, September 14, 2025—perfect for a late-night travel plan! Ask me about monasteries, treks, food, or travel tips.</div>
      </div>

      <!-- Sticky Plan Trip Button -->
      <div class="p-4 bg-gray-50 border-t sticky bottom-0">
        <button id="plan-trip-btn" class="w-full bg-green-600 text-white px-3 py-2 rounded hover:bg-green-700">
          Plan My Trip
        </button>
      </div>

      <!-- Input Bar -->
      <div class="chat-input p-4 border-t flex gap-2 bg-white">
        <input id="user-input" type="text" placeholder="Type your message..."
          class="flex-1 border rounded p-2">
        <button id="send-btn" class="bg-green-700 text-white px-4 rounded hover:bg-green-800">Send</button>
      </div>
    </div>

    <!-- Trip Planner Dialog -->
    <div id="trip-dialog" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
      <div class="bg-white rounded-lg shadow-lg p-6 w-96">
        <h2 class="text-xl font-bold mb-4">🗺 Plan Your Trip</h2>

        <label class="block mb-2">Present State:</label>
        <input type="text" id="trip-state" class="w-full border p-2 rounded mb-4" placeholder="e.g. West Bengal">

        <label class="block mb-2">Number of Days:</label>
        <input type="number" id="trip-days" class="w-full border p-2 rounded mb-4" placeholder="e.g. 5">

        <label class="block mb-2">Budget:</label>
        <select id="trip-budget" class="w-full border p-2 rounded mb-4">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>

        <label class="block mb-2">Transport:</label>
        <select id="trip-transport" class="w-full border p-2 rounded mb-4">
          <option value="Car">Car</option>
          <option value="Bus">Bus</option>
          <option value="Train">Train</option>
          <option value="Flight">Flight</option>
        </select>

        <div class="flex justify-end gap-2">
          <button id="cancel-trip" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
          <button id="submit-trip" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Plan</button>
        </div>
      </div>
    </div>

    <!-- React App -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Chatbot + Trip Planner JS -->
    <script>
      const API_KEY = "AIzaSyAEeVfR3X137ldWWeHj0-7OAsC5C_rZrw0"; // 🔑 Replace with your Gemini API Key
      const MODEL = "gemini-1.5-flash";

      const toggleBtn = document.getElementById("chatbot-toggle");
      const chatbot = document.getElementById("chatbot");
      const closeBtn = document.getElementById("close-chat");
      const chatbox = document.getElementById("chatbox");
      const sendBtn = document.getElementById("send-btn");
      const userInput = document.getElementById("user-input");
      const tripDialog = document.getElementById("trip-dialog");
      const planTripBtn = document.getElementById("plan-trip-btn");
      const cancelTripBtn = document.getElementById("cancel-trip");
      const submitTripBtn = document.getElementById("submit-trip");

      let chatHistory = [
        { role: "model", parts: [{ text: "You are a helpful Sikkim Tourism guide." }] }
      ];

      // Toggle chatbot
      toggleBtn.addEventListener("click", () => {
        chatbot.classList.remove("hidden");
        chatbot.classList.add("visible");
      });
      closeBtn.addEventListener("click", () => {
        chatbot.classList.remove("visible");
        chatbot.classList.add("hidden");
      });

      // Trip Dialog
      planTripBtn.addEventListener("click", () => tripDialog.classList.remove("hidden"));
      cancelTripBtn.addEventListener("click", () => tripDialog.classList.add("hidden"));

      submitTripBtn.addEventListener("click", () => {
        const days = document.getElementById("trip-days").value;
        const budget = document.getElementById("trip-budget").value;
        const transport = document.getElementById("trip-transport").value;
        const state = document.getElementById("trip-state").value;

        if (!days) { alert("Please enter number of days"); return; }

        const tripRequest = `Plan a ${days}-day trip from ${state} to Sikkim with a ${budget} budget using ${transport} as transport.`;
        tripDialog.classList.add("hidden");
        addMessage("user", tripRequest);
        handleBotReply(tripRequest);
      });

      // Add Message
      function addMessage(sender, text) {
        const msg = document.createElement("div");
        msg.classList.add("message", "p-2", "rounded", "whitespace-pre-wrap");
        if (sender === "user") msg.classList.add("bg-green-100", "self-end");
        else msg.classList.add("bg-gray-200");
        msg.innerText = text;
        chatbox.appendChild(msg);
        chatbox.scrollTop = chatbox.scrollHeight;
      }

      // Call Gemini API
      async function callGemini(prompt) {
        try {
          chatHistory.push({ role: "user", parts: [{ text: prompt }] });

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ contents: chatHistory })
            }
          );

          const data = await response.json();
          const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "❌ Sorry, no answer.";
          chatHistory.push({ role: "model", parts: [{ text: reply }] });
          return reply;
        } catch (error) {
          console.error(error);
          return "⚠️ Error connecting to Gemini API.";
        }
      }

      // Bot Reply
      async function handleBotReply(text) {
        const typingMsg = document.createElement("div");
        typingMsg.classList.add("message", "bot", "p-2", "rounded", "bg-gray-200");
        typingMsg.innerText = "✍️ Typing...";
        chatbox.appendChild(typingMsg);
        chatbox.scrollTop = chatbox.scrollHeight;

        const reply = await callGemini(text);
        typingMsg.innerText = reply;
      }

      // Send Message
      async function handleSend() {
        const text = userInput.value.trim();
        if (text === "") return;
        addMessage("user", text);
        userInput.value = "";
        handleBotReply(text);
      }

      sendBtn.addEventListener("click", handleSend);
      userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>
  </body>
</html>
